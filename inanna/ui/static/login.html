<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>𒀭 INANNA NYX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@300;400;600;900&display=swap');

:root {
  --ob:    #030201;
  --deep:  #070503;
  --stone: #0e0b07;
  --clay:  #18130d;
  --dust:  #2e2010;
  --silt:  #3d2c18;
  --mud:   #5a4028;
  --gold1: #7a5520;
  --gold2: #a07828;
  --gold3: #d4a030;
  --gold4: #eebc48;
  --gold5: #f8d060;
  --jade:  #5aaa70;
  --rose4: #e890a8;
  --danger:#cc6060;
  --parch: #f4e0a0;
  --cream: #e8cc80;
  --ivory: #d8b868;
  --faded: #9a7a48;
  --dim:   #5a3e20;
  --dimmer:#3a2810;
  --mono: 'Share Tech Mono', monospace;
  --serif:'Cinzel', serif;
  --dec:  'Cinzel Decorative', serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 18%, rgba(248,208,96,.08), transparent 26%),
    radial-gradient(circle at 18% 80%, rgba(106,32,64,.10), transparent 28%),
    radial-gradient(circle at 82% 20%, rgba(61,44,24,.22), transparent 24%),
    linear-gradient(180deg, #0a0704 0%, #050302 100%);
  color: var(--cream);
  font-family: var(--mono);
}

body {
  position: relative;
  display: grid;
  place-items: center;
}

.starfield,
.starfield::before,
.starfield::after {
  position: absolute;
  inset: 0;
  content: "";
  pointer-events: none;
}

.starfield {
  background-image:
    radial-gradient(circle at 12% 18%, rgba(248,208,96,.55) 0 1px, transparent 1.6px),
    radial-gradient(circle at 76% 24%, rgba(238,188,72,.35) 0 1px, transparent 1.6px),
    radial-gradient(circle at 30% 72%, rgba(232,204,128,.28) 0 1px, transparent 1.6px),
    radial-gradient(circle at 64% 82%, rgba(248,208,96,.42) 0 1px, transparent 1.8px),
    radial-gradient(circle at 88% 64%, rgba(232,204,128,.26) 0 1px, transparent 1.6px);
  opacity: .7;
}

.starfield::before {
  background:
    linear-gradient(90deg, transparent, rgba(160,120,40,.18), transparent),
    linear-gradient(90deg, transparent, rgba(160,120,40,.12), transparent);
  background-size: 100% 1px, 100% 1px;
  background-repeat: no-repeat;
  background-position: 50% 18%, 50% 82%;
}

.login-shell {
  position: relative;
  z-index: 1;
  width: min(92vw, 520px);
  padding: 44px 42px 34px;
  border: 1px solid rgba(160,120,40,.28);
  background:
    linear-gradient(180deg, rgba(18,12,6,.92), rgba(8,5,3,.96));
  box-shadow:
    0 0 0 1px rgba(248,208,96,.04) inset,
    0 28px 70px rgba(0,0,0,.55),
    0 0 120px rgba(122,85,32,.10);
  backdrop-filter: blur(6px);
}

.login-shell::before {
  content: "";
  position: absolute;
  inset: 14px;
  border: 1px solid rgba(90,64,40,.35);
  pointer-events: none;
}

.login-glyph {
  text-align: center;
  font-size: 54px;
  line-height: 1;
  color: var(--gold4);
  text-shadow: 0 0 24px rgba(248,208,96,.22);
  margin-bottom: 12px;
  animation: pulse 4s ease-in-out infinite;
}

.login-title {
  text-align: center;
  font-family: var(--dec);
  font-size: clamp(30px, 6vw, 46px);
  letter-spacing: 8px;
  color: var(--gold5);
}

.login-subtitle {
  margin-top: 10px;
  text-align: center;
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--ivory);
}

.login-tagline {
  margin-top: 16px;
  text-align: center;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--faded);
  line-height: 1.8;
}

.login-divider {
  margin: 28px auto 24px;
  width: min(100%, 280px);
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(238,188,72,.65), transparent);
}

.login-form {
  display: grid;
  gap: 20px;
}

.login-field {
  display: grid;
  gap: 8px;
}

.login-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--faded);
}

.login-input {
  width: 100%;
  padding: 12px 2px 10px;
  border: 0;
  border-bottom: 1px solid rgba(160,120,40,.55);
  background: transparent;
  color: var(--parch);
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 2px;
  outline: none;
  transition: border-color .2s ease, color .2s ease, transform .2s ease;
}

.login-input::placeholder {
  color: rgba(90,62,32,.85);
  letter-spacing: 1px;
}

.login-input:focus {
  border-bottom-color: var(--gold5);
  color: var(--gold5);
  transform: translateY(-1px);
}

.login-btn {
  margin-top: 8px;
  padding: 13px 18px;
  border: 1px solid rgba(212,160,48,.72);
  background: rgba(212,160,48,.05);
  color: var(--gold4);
  font-family: var(--dec);
  font-size: 11px;
  letter-spacing: 5px;
  cursor: pointer;
  transition: transform .2s ease, border-color .2s ease, background .2s ease, color .2s ease;
}

.login-btn:hover {
  transform: translateY(-1px);
  border-color: var(--gold5);
  background: rgba(212,160,48,.12);
  color: var(--gold5);
}

.login-btn:disabled {
  opacity: .6;
  cursor: default;
  transform: none;
}

.login-error {
  min-height: 16px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--danger);
}

.login-status {
  min-height: 16px;
  text-align: center;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--jade);
}

.login-phase {
  margin-top: 26px;
  text-align: center;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--dimmer);
}

.shake {
  animation: shake .38s ease;
}

@keyframes pulse {
  0%, 100% { opacity: .72; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(3px); }
}

@media (max-width: 640px) {
  .login-shell {
    width: calc(100vw - 28px);
    padding: 34px 24px 28px;
  }

  .login-title {
    letter-spacing: 5px;
  }

  .login-subtitle {
    letter-spacing: 4px;
    font-size: 10px;
  }

  .login-tagline {
    font-size: 8px;
    letter-spacing: 2px;
  }
}
</style>
</head>
<body>
<div class="starfield" aria-hidden="true"></div>

<main class="login-shell">
  <div class="login-glyph">𒀭</div>
  <div class="login-title">INANNA NYX</div>
  <div class="login-subtitle">SOVEREIGN INTELLIGENCE</div>
  <div class="login-tagline">THE LIVING INTELLIGENCE · GATES OF URUK · ABZU CODEX</div>
  <div class="login-divider"></div>

  <form class="login-form" id="login-form">
    <div class="login-field">
      <label class="login-label" for="username">IDENTITY</label>
      <input
        type="text"
        id="username"
        class="login-input"
        placeholder="your name"
        autocomplete="username"
        spellcheck="false"
      />
    </div>

    <div class="login-field">
      <label class="login-label" for="password">ACCESS CODE</label>
      <input
        type="password"
        id="password"
        class="login-input"
        placeholder="••••••••••"
        autocomplete="current-password"
      />
    </div>

    <button type="submit" class="login-btn" id="login-btn">[ ENTER ]</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-status" id="login-status"></div>
  </form>

  <div class="login-phase" id="login-phase">__CURRENT_PHASE__</div>
</main>

<script>
const form = document.getElementById('login-form');
const button = document.getElementById('login-btn');
const errorEl = document.getElementById('login-error');
const statusEl = document.getElementById('login-status');
const userEl = document.getElementById('username');
const passEl = document.getElementById('password');

function setFailure(message) {
  errorEl.textContent = message;
  statusEl.textContent = '';
  form.classList.remove('shake');
  void form.offsetWidth;
  form.classList.add('shake');
  window.setTimeout(() => form.classList.remove('shake'), 420);
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const username = userEl.value.trim();
  const password = passEl.value;
  errorEl.textContent = '';

  if (!username || !password) {
    setFailure('identity and access code required');
    return;
  }

  button.disabled = true;
  statusEl.textContent = 'entering...';

  try {
    const response = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
    });

    if (!response.ok) {
      setFailure(response.status === 401 ? 'invalid credentials' : 'connection error');
      button.disabled = false;
      return;
    }

    const data = await response.json();
    sessionStorage.setItem('inanna_token', data.token);
    sessionStorage.setItem('inanna_user', data.username);
    sessionStorage.setItem('inanna_role', data.role);
    statusEl.textContent = 'entering...';
    window.setTimeout(() => {
      window.location.href = '/app';
    }, 220);
  } catch (error) {
    setFailure('connection error');
    button.disabled = false;
  }
});

window.addEventListener('DOMContentLoaded', () => {
  userEl.focus();
});
</script>
</body>
</html>
